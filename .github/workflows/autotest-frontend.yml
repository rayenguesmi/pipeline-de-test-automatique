name: "AutoTest — Frontend & Backend CI"

on:
  push:
    branches: [ main, develop ]
    paths: [ "user/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-frontend:
    name: "React Build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: user/user-entity-REACT-NODE-JS-/client/package-lock.json

      - name: Install and build
        run: cd user/user-entity-REACT-NODE-JS-/client && npm ci && npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: user/user-entity-REACT-NODE-JS-/client/dist/
          retention-days: 7

  check-backend:
    name: "Node.js Check"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: user/user-entity-REACT-NODE-JS-/server/package-lock.json

      - name: Install server deps
        run: cd user/user-entity-REACT-NODE-JS-/server && npm ci

      - name: Check server starts
        env:
          PORT: "5000"
          NODE_ENV: "test"
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          cd user/user-entity-REACT-NODE-JS-/server
          node server.js &
          sleep 8
          curl -s http://localhost:5000 && echo "Server OK" || echo "Server needs DB"
        continue-on-error: true

  summary:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [ build-frontend, check-backend ]
    if: always()
    steps:
      - name: Print results
        run: |
          echo "React Build  : ${{ needs.build-frontend.result }}"
          echo "Node.js Check: ${{ needs.check-backend.result }}"
